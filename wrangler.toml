name = "agenciajn"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

routes = [
  { pattern = "agenciajn.com.br/*", zone_id = "2a84e0977af17edebb7703625a956920" },
  { pattern = "www.agenciajn.com.br/*", zone_id = "2a84e0977af17edebb7703625a956920" }
]

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "agenciajn"

[[d1_databases]]
binding = "DB"
database_name = "agencia-jn-db"
database_id = "0f170a8b-8411-4448-ac1a-a966cc70a2cb"

[[r2_buckets]]
binding = "R2"
bucket_name = "agencia-jn-media"

[[kv_namespaces]]
binding = "KV"
id = "643beb7251384dd18f2457f9b41ab93d"
